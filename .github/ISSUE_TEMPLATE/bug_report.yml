name: Bug Report
description: Report a bug in MobileClaw
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. 
        2. 
        3. 
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: Pixel 7a, Android 16
  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "1.0.0"
