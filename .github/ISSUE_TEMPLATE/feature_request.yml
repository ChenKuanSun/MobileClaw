name: Feature Request
description: Suggest a feature for MobileClaw
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: How would this help you?
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
